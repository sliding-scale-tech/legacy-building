name: Branch Name Guard

on:
    create:
    push:

jobs:
    validate-branch:
        # Skip tag pushes/creates; only validate real branches
        if: github.ref_type == 'branch'
        runs-on: ubuntu-latest

        steps:
            - name: Validate branch name
              env:
                  BRANCH: ${{ github.ref_name }}
              run: |
                  echo "Branch: $BRANCH"

                  # allow main and staging
                  if [[ "$BRANCH" == "main" || "$BRANCH" == "staging" ]]; then
                    echo "OK system branch"
                    exit 0
                  fi

                  # enforce pattern
                  if [[ "$BRANCH" =~ ^(feature|bugfix|hotfix|release)/[a-z0-9._-]+$ ]]; then
                    echo "Valid branch"
                    exit 0
                  fi

                  echo "❌ Invalid branch name: $BRANCH"
                  exit 1
